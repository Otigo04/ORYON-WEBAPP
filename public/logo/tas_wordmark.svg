<svg width="360" height="110" viewBox="0 0 360 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gemTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#95D5B2"/>
      <stop offset="100%" stop-color="#40916C"/>
    </linearGradient>
  </defs>

  <!-- Gem facets -->
  <polygon points="50,4 82,28 18,28" fill="url(#gemTop)"/>
  <polygon points="18,28 50,4 50,72" fill="#2D6A4F"/>
  <polygon points="82,28 50,4 50,72" fill="#52B788"/>
  <polygon points="18,28 50,72 30,104" fill="#1B4332"/>
  <polygon points="82,28 50,72 70,104" fill="#40916C"/>
  <polygon points="30,104 50,72 70,104" fill="#74C69D"/>

  <!-- Silver edge highlights -->
  <polyline points="50,4 18,28 30,104 50,72" fill="none" stroke="#C8D8DC" stroke-width="1" opacity="0.6"/>
  <polyline points="50,4 82,28 70,104 50,72" fill="none" stroke="#C8D8DC" stroke-width="1" opacity="0.6"/>

  <!-- Dot accents -->
  <circle cx="86" cy="16" r="5" fill="#A8B8C0" opacity="0.8"/>
  <circle cx="95" cy="28" r="3" fill="#74C69D" opacity="0.6"/>

  <!-- Divider -->
  <line x1="104" y1="10" x2="104" y2="100" stroke="#A8B8C0" stroke-width="0.8" opacity="0.35"/>

  <!-- TAS wordmark -->
  <text x="118" y="72"
    font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-size="62" font-weight="700" letter-spacing="-1.5"
    fill="#FFFFFF">TAS</text>

  <!-- webworks subline -->
  <text x="120" y="97"
    font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-size="17" font-weight="400" letter-spacing="5.5"
    fill="#52B788">WEBWORKS</text>
</svg>
